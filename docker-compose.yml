services:
  db:
    image: postgres:17
    container_name: db
    environment:
      - POSTGRES_DB=${DB_URL}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - KEY_TOKEN=${KEY_TOKEN}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  library:
    depends_on:
      - db
    build:
      context: .
    container_name: library
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - KEY_TOKEN=${KEY_TOKEN}
    ports:
      - "8080:8080"
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - RAW_BUCKET=${RAW_BUCKET:-raw}
      - COVER_BUCKET=${COVER_BUCKET:-cover}
      - PARSED_BUCKET=${PARSED_BUCKET:-parsed}
      - INDEX_BUCKET=${INDEX_BUCKET:-index}
      - ES_SNAPSHOTS_BUCKET=${ES_SNAPSHOTS_BUCKET:-es-snapshots}
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
       mc mb -p local/$$RAW_BUCKET || true &&
       mc mb -p local/$$COVER_BUCKET || true &&
       mc mb -p local/$$PARSED_BUCKET || true &&
       mc mb -p local/$$INDEX_BUCKET || true &&
       mc mb -p local/$$ES_SNAPSHOTS_BUCKET || true"
volumes:
  minio-data:
  postgres_data:
